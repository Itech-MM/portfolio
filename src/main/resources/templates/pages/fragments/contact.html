<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <section th:fragment="contact" class="contact-section" id="contact">
    <div class="contact-container">
      <div class="contact-info reveal-on-scroll">
        <h2><i class="fas fa-paper-plane"></i> Let’s create together</h2>
        <p>Got a project in mind? Reach out – we reply within 24h.</p>
        <ul class="contact-details">
          <li><i class="fas fa-envelope"></i> itech.saizawmyint@gmail.com</li>
          <li><i class="fas fa-comment-dots"></i> +959 883 360 492</li>
          <li><i class="fa-brands fa-viber"></i> +959 883 360 492</li>
        </ul>
        <div class="social-links">
          <a href="https://github.com/Itech-MM" target="_blank"><i class="fab fa-github"></i></a>
          <a href="#"  target="_blank"><i class="fab fa-linkedin-in"></i></a>
          <a href="https://t.me/flexitechmm" target="_blank"><i class="fa-brands fa-telegram"></i></a>
          <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
        </div>
      </div>
      <form class="contact-form reveal-on-scroll delay-1" th:action="@{/contact}" th:method="post">
        <input type="text" placeholder="Your name" required>
        <input type="email" placeholder="Email address" required>
        <textarea rows="4" placeholder="Tell us about your project..."></textarea>
        <button type="submit" class="btn-primary"><i class="fas fa-arrow-right"></i> Send message</button>
      </form>
    </div>
  </section>

  <style>
    
  </style>
</body>
</html>
