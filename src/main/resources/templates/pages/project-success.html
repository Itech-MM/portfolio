<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Request Submitted – Flexitech</title>
    <link rel="stylesheet" th:href="@{/css/start-project.css}" />
    <style>
        .success-wrapper {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .success-container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-icon {
            font-size: 4.5rem;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 12px rgba(243, 156, 18, 0.15));
        }

        .success-title {
            color: var(--color-text-white);
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .success-message {
            color: var(--color-text-secondary);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .btn-home {
            background: linear-gradient(105deg, var(--color-secondary), var(--color-secondary-end));
            color: #1e1a2f;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 1rem;
        }

        .btn-home:hover {
            transform: translateY(-4px);
            background: linear-gradient(105deg, var(--color-accent-gold), var(--color-accent-gold-dark));
            box-shadow: 0 12px 30px rgba(243, 156, 18, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .success-title {
                font-size: 2rem;
            }
            .success-message {
                font-size: 1rem;
            }
            .btn-home {
                padding: 0.9rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <section class="onboarding-section">
            <div class="success-wrapper">
                <div class="success-container">
                    <div class="success-icon">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <h2 class="success-title">Request Received!</h2>
                    <p class="success-message">Thank you for trusting <strong>Flexitech Studio</strong> with your vision. Our team will review your inquiry and get back to you shortly via email.</p>
                    <a th:href="@{/#home}" class="btn-home">
                        <i class="fa-solid fa-house"></i> Back to Homepage
                    </a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
