<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Start a Project – Flexitech</title>
    <link rel="stylesheet" th:href="@{/css/start-project.css}" />
</head>
<body>
    <div layout:fragment="content">
        <section class="onboarding-section">
            <div class="onboarding-container">
                <div class="onboarding-header">
                    <h2>Let's build something great</h2>
                    <p>Tell us a bit about your vision so we can tailor our approach.</p>
                </div>

                <div class="step-indicator">
                    <div class="step active" id="indicator-1">1. Info</div>
                    <div class="step" id="indicator-2">2. Service</div>
                    <div class="step" id="indicator-3">3. Scope</div>
                </div>

                <form class="onboarding-form" th:action="@{/start-project}" th:method="post" id="projectForm">
                    
                    <div class="form-step active" data-step="1">
                        <h3>Contact Details</h3>
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" name="clientName" placeholder="John Doe" required>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" name="clientEmail" placeholder="john@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Phone / Viber / Telegram (Optional)</label>
                            <input type="text" name="clientContact" placeholder="+959...">
                        </div>
                        <div class="form-navigation">
                            <button type="button" class="btn-next" onclick="nextStep(1)">Next <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                    </div>

                    <div class="form-step" data-step="2">
                        <h3>Project Type & Budget</h3>
                        <div class="input-group">
                            <label>Primary Service Needed</label>
                            <select name="projectType" required>
                                <option value="" selected disabled>Select a service...</option>
                                <option value="web">Custom Web Development</option>
                                <option value="mobile">Mobile Application</option>
                                <option value="embedded">Embedded Software / Desktop Integration</option>
                                <option value="ecommerce">E-Commerce Website</option>
                                <option value="uiux">UI/UX Design</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Estimated Budget</label>
                            <select name="budget">
                                <option value="tbd">To be discussed</option>
                                <option value="under_1k">Under $1,000</option>
                                <option value="1k_5k">$1,000 - $5,000</option>
                                <option value="5k_plus">$5,000+</option>
                            </select>
                        </div>
                        <div class="form-navigation">
                            <button type="button" class="btn-prev" onclick="prevStep(2)"><i class="fa-solid fa-arrow-left"></i> Back</button>
                            <button type="button" class="btn-next" onclick="nextStep(2)">Next <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                    </div>

                    <div class="form-step" data-step="3">
                        <h3>Project Scope</h3>
                        <div class="input-group">
                            <label>Briefly describe your requirements</label>
                            <textarea name="projectDetails" rows="5" placeholder="What is the main goal of your project? Who are your target users? Any specific tech stack preferences?" required></textarea>
                        </div>
                        <div class="form-navigation">
                            <button type="button" class="btn-prev" onclick="prevStep(3)"><i class="fa-solid fa-arrow-left"></i> Back</button>
                            <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Submit Request</button>
                        </div>
                    </div>

                </form>
            </div>
        </section>

        <script>
            let currentStep = 1;

            function showStep(step) {
                document.querySelectorAll('.form-step').forEach(el => {
                    el.classList.remove('active');
                });
                document.querySelectorAll('.step').forEach(el => {
                    el.classList.remove('active');
                });

                document.querySelector(`.form-step[data-step="${step}"]`).classList.add('active');
                
                for (let i = 1; i <= step; i++) {
                    document.getElementById(`indicator-${i}`).classList.add('active');
                }
            }

            function nextStep(current) {
                const form = document.getElementById('projectForm');
                const inputs = form.querySelector(`[data-step="${current}"]`).querySelectorAll('input, select, textarea');
                
                let valid = true;
                inputs.forEach(input => {
                    if (!input.checkValidity()) {
                        input.reportValidity();
                        valid = false;
                    }
                });

                if (valid) {
                    currentStep = current + 1;
                    showStep(currentStep);
                }
            }

            function prevStep(current) {
                currentStep = current - 1;
                showStep(currentStep);
            }
        </script>
    </div>
</body>
</html>
