<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/header.css}" />
</head>
<body>
	<th:block th:fragment="header">
		<header class="site-header" id="mainHeader">
			<div class="header-container">
				<a th:href="@{/#home}" class="brand" aria-label="Flexitech Studio Home"> 
					<img th:src="@{/images/logo/logo.png}" width="32" alt="Logo">
					<div>
						<span class="brand-text">Flexitech</span> <span class="brand-sub">✦ creative dev studio</span>
					</div>
				</a>

				<div class="mobile-toggle" id="mobileMenuToggle" aria-label="Menu" aria-expanded="false">
					<i class="fa-solid fa-bars" id="toggleIcon"></i>
				</div>

				<div class="nav-menu" id="navMenu">
					<ul class="nav-links">
						<li><a th:href="@{/#home}" class="nav-link">Home</a></li>
						<li><a th:href="@{/#about}" class="nav-link">About Us</a></li>
						<li><a th:href="@{/#work}" class="nav-link">Services</a></li>
						<li><a th:href="@{/#projects}" class="nav-link">Projects</a></li>
						<li><a th:href="@{/#team}" class="nav-link">Team</a></li>
						<li><a th:href="@{/#contact}" class="nav-link">Contact</a></li>
					</ul>
					<a th:href="@{/start-project}" class="btn-header text-decoration-none">
						<i class="fa-solid fa-rocket"></i> <span>Start a project</span>
					</a>
				</div>
			</div>
			<div id="menuOverlay" class="menu-overlay"></div>
		</header>

		<script>
            (function() {
                const toggleBtn = document.getElementById('mobileMenuToggle');
                const toggleIcon = document.getElementById('toggleIcon');
                const navMenu = document.getElementById('navMenu');
                const overlay = document.getElementById('menuOverlay');
                const header = document.getElementById('mainHeader');
                
                if (!toggleBtn || !navMenu) return;

                function closeMenu() {
                    navMenu.classList.remove('active');
                    if (overlay) overlay.classList.remove('active');
                    toggleBtn.setAttribute('aria-expanded', 'false');
                    if (toggleIcon) {
                        toggleIcon.classList.remove('fa-xmark');
                        toggleIcon.classList.add('fa-bars');
                    }
                    document.body.style.overflow = '';
                }

                function openMenu() {
                    navMenu.classList.add('active');
                    if (overlay) overlay.classList.add('active');
                    toggleBtn.setAttribute('aria-expanded', 'true');
                    if (toggleIcon) {
                        toggleIcon.classList.remove('fa-bars');
                        toggleIcon.classList.add('fa-xmark');
                    }
                    document.body.style.overflow = 'hidden';
                }

                toggleBtn.addEventListener('click', function() {
                    if (navMenu.classList.contains('active')) {
                        closeMenu();
                    } else {
                        openMenu();
                    }
                });

                if (overlay) {
                    overlay.addEventListener('click', closeMenu);
                }

                document.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', function(e) {
                        // Auto-close the mobile menu when a link is tapped
                        if (navMenu.classList.contains('active')) closeMenu();

                        const targetUrl = this.getAttribute('href');
                        
                        // If not on the homepage, let the browser navigate to /#hash naturally
                        if (window.location.pathname !== '/') {
                            return;
                        }

                        const targetId = targetUrl.substring(targetUrl.indexOf('#'));
                        if (targetId && targetId !== '#') {
                            e.preventDefault();
                            const targetElement = document.querySelector(targetId);
                            if (targetElement) {
                                targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        }
                    });
                });

                window.addEventListener('scroll', function() {
                    header.classList.toggle('scrolled', window.scrollY > 20);
                });

                window.addEventListener('resize', function() {
                    if (window.innerWidth > 820 && navMenu.classList.contains('active')) closeMenu();
                });
            })();
        </script>
	</th:block>
</body>
</html>
